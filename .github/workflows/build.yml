name: Build Google Contacts Avatar VCF

on:
  push:
    tags:
      - "20[0-9][0-9].[0-9][0-9].[0-9][0-9]"
      - "20[0-9][0-9].[0-9][0-9].[0-9][0-9].*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release tag
        run: |
          tag="${GITHUB_REF_NAME}"

          if [[ ! "$tag" =~ ^([0-9]{4})\.([0-9]{2})\.([0-9]{2})(\.[A-Za-z0-9][A-Za-z0-9._-]*)?$ ]]; then
            echo "Invalid release tag: $tag"
            echo "Expected YYYY.MM.DD or YYYY.MM.DD.<suffix>."
            exit 1
          fi

          date_part="${BASH_REMATCH[1]}-${BASH_REMATCH[2]}-${BASH_REMATCH[3]}"
          normalized="$(date -u -d "$date_part" +%Y-%m-%d 2>/dev/null || true)"

          if [[ "$normalized" != "$date_part" ]]; then
            echo "Invalid release date: $date_part"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache npm downloads
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install dependencies
        run: npm install

      - name: Read cache date
        id: cache-date
        run: echo "value=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Cache icon index
        id: icon-index-cache
        uses: actions/cache@v4
        with:
          path: data/icon-index.json
          key: icon-index-${{ runner.os }}-${{ steps.cache-date.outputs.value }}-${{ hashFiles('data/brands.json') }}
          restore-keys: |
            icon-index-${{ runner.os }}-${{ steps.cache-date.outputs.value }}-

      - name: Build icon index
        if: steps.icon-index-cache.outputs.cache-hit != 'true'
        run: npm run build:icons

      - name: Build VCF
        run: npm run build:vcf

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: dist/google-contacts-avatar.vcf
          fail_on_unmatched_files: true
