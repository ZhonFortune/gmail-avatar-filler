name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy.yml"
      - "data/**"
      - "index.html"
      - "package.json"
      - "public/**"
      - "scripts/build-icon-index.js"
      - "scripts/build-site-data.js"
      - "src/**"
      - "vite.config.js"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  pages:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Cache npm downloads
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install dependencies
        run: npm install

      - name: Read cache date
        id: cache-date
        run: echo "value=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Cache icon index
        id: icon-index-cache
        uses: actions/cache@v4
        with:
          path: data/icon-index.json
          key: icon-index-${{ runner.os }}-${{ steps.cache-date.outputs.value }}-${{ hashFiles('data/brands.json') }}
          restore-keys: |
            icon-index-${{ runner.os }}-${{ steps.cache-date.outputs.value }}-

      - name: Build icon index
        if: steps.icon-index-cache.outputs.cache-hit != 'true'
        run: npm run build:icons

      - name: Build site
        run: npm run build

      - name: Copy site data
        run: npm run build:site-data

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
